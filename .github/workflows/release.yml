name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            os: macos-latest
          - target: linux-x64
            os: ubuntu-latest
          - target: linux-arm64
            os: ubuntu-24.04-arm

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Build binary
        run: bun run scripts/build.ts --target ${{ matrix.target }}

      - name: Create tarball
        run: tar czf gittui-${{ matrix.target }}.tar.gz gittui

      - uses: actions/upload-artifact@v4
        with:
          name: gittui-${{ matrix.target }}
          path: gittui-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: npm publish --access public

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Update Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DARWIN_ARM64_SHA=$(sha256sum artifacts/gittui-darwin-arm64.tar.gz | cut -d' ' -f1)
          LINUX_ARM64_SHA=$(sha256sum artifacts/gittui-linux-arm64.tar.gz | cut -d' ' -f1)
          LINUX_X64_SHA=$(sha256sum artifacts/gittui-linux-x64.tar.gz | cut -d' ' -f1)

          cat > Formula/gittui.rb << FORMULA
          class Gittui < Formula
            desc "Modern terminal git client"
            homepage "https://github.com/rsbmk/gittui"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/rsbmk/gittui/releases/download/v#{version}/gittui-darwin-arm64.tar.gz"
                sha256 "${DARWIN_ARM64_SHA}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/rsbmk/gittui/releases/download/v#{version}/gittui-linux-arm64.tar.gz"
                sha256 "${LINUX_ARM64_SHA}"
              end

              on_intel do
                url "https://github.com/rsbmk/gittui/releases/download/v#{version}/gittui-linux-x64.tar.gz"
                sha256 "${LINUX_X64_SHA}"
              end
            end

            def install
              bin.install "gittui"
            end

            test do
              assert_match "gittui", shell_output("#{bin}/gittui --version")
            end
          end
          FORMULA

      - name: Commit and push formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/gittui.rb
          git diff --staged --quiet || (git commit -m "chore(homebrew): update formula to ${GITHUB_REF_NAME#v}" && git push origin main)
